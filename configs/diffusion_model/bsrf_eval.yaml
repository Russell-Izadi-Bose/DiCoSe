diffusion_sigma_distribution:
  _target_: audio_diffusion_pytorch_.LogNormalDistribution
  mean: -3.0 #-1.2 #
  std: 1.0 #1.2 #



train_dataset:
  _target_: main.msst.utils.dataset.MSSDataset
  data_path: dataset/musdb18hq/train
  metadata_path: dataset/musdb18hq/train_metadata.pkl
  dataset_type: 1
  config:
    instruments:  ['drums', 'bass', "other", "vocals" ]
    target_instrument: null
    audio:
      chunk_size: 485100
      dim_f: 1024
      dim_t: 801 # don't work (use in model)
      hop_length: 441 # don't work (use in model)
      n_fft: 2048
      num_channels: 2
      sample_rate: 44100
      min_mean_abs: 0.000
    augmentations:
      enable: true # enable or disable all augmentations (to fast disable if needed)
      loudness: true # randomly change loudness of each stem on the range (loudness_min; loudness_max)
      loudness_min: 0.5
      loudness_max: 1.5
      mixup: true # mix several stems of same type with some probability (only works for dataset types: 1, 2, 3)
      mixup_probs: !!python/tuple # 2 additional stems of the same type (1st with prob 0.2, 2nd with prob 0.02)
        - 0.2
        - 0.02
      mixup_loudness_min: 0.5
      mixup_loudness_max: 1.5

      all:
        channel_shuffle: 0.5 # Set 0 or lower to disable
        random_inverse: 0.1 # inverse track (better lower probability)
        random_polarity: 0.5 # polarity change (multiply waveform to -1)

      vocals:
          pitch_shift: 0.1
          pitch_shift_min_semitones: -5
          pitch_shift_max_semitones: 5
          seven_band_parametric_eq: 0.1
          seven_band_parametric_eq_min_gain_db: -9
          seven_band_parametric_eq_max_gain_db: 9
          tanh_distortion: 0.1
          tanh_distortion_min: 0.1
          tanh_distortion_max: 0.7
      bass:
        pitch_shift: 0.1
        pitch_shift_min_semitones: -2
        pitch_shift_max_semitones: 2
        seven_band_parametric_eq: 0.1
        seven_band_parametric_eq_min_gain_db: -3
        seven_band_parametric_eq_max_gain_db: 6
        tanh_distortion: 0.1
        tanh_distortion_min: 0.1
        tanh_distortion_max: 0.5
      drums:
        pitch_shift: 0.1
        pitch_shift_min_semitones: -5
        pitch_shift_max_semitones: 5
        seven_band_parametric_eq: 0.1
        seven_band_parametric_eq_min_gain_db: -9
        seven_band_parametric_eq_max_gain_db: 9
        tanh_distortion: 0.1
        tanh_distortion_min: 0.1
        tanh_distortion_max: 0.6
      other:
        pitch_shift: 0.1
        pitch_shift_min_semitones: -4
        pitch_shift_max_semitones: 4
        gaussian_noise: 0.1
        gaussian_noise_min_amplitude: 0.001
        gaussian_noise_max_amplitude: 0.015
        time_stretch: 0.1
        time_stretch_min_rate: 0.8
        time_stretch_max_rate: 1.25

val_dataset:
  _target_: main.data.MUSDB_Aug_Repitch_Tracks_Dataset_MSST
  audio_files_dir: "dataset/musdb18hq/test"
  sr: 44100
  channels: 2
  min_duration: 12.0
  max_duration: 640.0
  aug_shift: 
  sample_length: 485100
  stems:   ['drums', 'bass', 'other', 'vocals']
  metadata: "metadata"
  normalize: False
  augment: False
      


datamodule:
  batch_size: 1
  num_workers: 4
  pin_memory: False
  val_batch_size: 8



audio_samples_logger:
  _target_: main.module_base.ClassCondSeparateTrackSampleLogger_MUSDB_MSST_stems_in_out
  num_items: 2
  channels: 2
  sampling_rate: 44100
  length: 485100
  sampling_steps: 3
  stems:  ['drums', 'bass', 'other', 'vocals']
  log_deterministic: true
  run_museval: true
  # log_all: true

# diffusion_sampler:
#   _target_: audio_diffusion_pytorch_.ADPM2Sampler
#   rho: 1.0

diffusion_sampler:
  _target_: audio_diffusion_pytorch_.diffusion.MSDMSampler
  s_churn: 1.0 #20.0
  num_resamples: 1 #2

diffusion_schedule:
  _target_: audio_diffusion_pytorch_.KarrasSchedule
  sigma_min: 0.0001
  sigma_max: 0.002 #0.01
  rho: 9.0



callbacks:
  rich_progress_bar:
    _target_: pytorch_lightning.callbacks.RichProgressBar

  model_summary:
    _target_: pytorch_lightning.callbacks.RichModelSummary
    max_depth: 1




trainer:
  accelerator: cuda
  # accumulate_grad_batches: 2   # ← THIS
  devices: [0, 1, 2]
  precision: "16-mixed" # Precision used for tensors, default `32`
  min_epochs: 0
  max_epochs: 1200
  enable_model_summary: False
  # log_every_n_steps: 10 # Logs metrics every N batches
  # check_val_every_n_epoch: 5
  # val_check_interval: # 1.0 #4000
  limit_val_batches: 
  limit_train_batches: 
  strategy: auto
  num_sanity_val_steps: 0


resume_from_checkpoint: lightning_logs/DiCoSe/diffusion_model_MSST_bs_roformer/model.ckpt