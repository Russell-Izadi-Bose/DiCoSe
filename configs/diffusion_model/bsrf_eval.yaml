    use_mixture_feature_conditioning: true
    use_torch_checkpoint: true
    
    # STFT adapter options: depthwise (fast, small), conv2d (slow, large), parallel_linear (fast, large - recommended)
    stft_adapter_type: conv2d
    stft_adapter_hidden: 128

    #### these 2 are importatn and not part of architecture
    diffusion_sigma_data: 0.06 # 0.2
    diffusion_dynamic_threshold: 0.0
    loss_type: bsroformer # mse | bsroformer

  # Optional: Load compatible weights from deterministic model checkpoint into diffusion model
