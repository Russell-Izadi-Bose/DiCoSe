# @package _global_

project_name: "CD_MSST_bs_roformer"
log_directory: "lightning_logs"
mode: test # train | test | validate_all

id:
  version: "CD_MSST_TEST"
  name: ""

model:
  _target_: main.audio_ctm.Audio_MSST_CTM_Model

  stem_to_diffuse: random
  diffusion_input_mix_prob: 0.5  # 1.0 = always extracted audio, 0.0 = always clean audio, 0.5 = 50/50 mix

  pre_trained_mixture_feature_extractor_model_config:
    _target_: train_audio_simple.Audio_MSST_Model_simple
    learning_rate: 1.0e-5
    patience: 3
    reduce_factor: 0.95

    model_type: bs_roformer
    dim: 384
    depth: 8
    stereo: true
    num_stems: 4
    time_transformer_depth: 1
    freq_transformer_depth: 1
    linear_transformer_depth: 0
